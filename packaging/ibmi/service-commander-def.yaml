# Service Commander (sc) unit definition, installed to
# /QOpenSys/etc/sc/services/ibmi-mcp-server-lite.yaml by the RPM.
#
# sc manages long-running daemons. Use --transport http for daemon mode;
# check_alive probes the default HTTP port (3010).
name: IBM i MCP Server Lite
dir: .
start_cmd: /QOpenSys/pkgs/bin/ibmi-mcp-server-lite --transport http --no-reload
check_alive: '3010'
batch_mode: 'true'
sbmjob_opts: 'JOBQ(QUSRNOMAX)'
environment_vars:
  - PATH=/QOpenSys/pkgs/bin:/QOpenSys/usr/bin:/usr/ccs/bin:/QOpenSys/usr/bin/X11:/usr/sbin:.:/usr/bin
