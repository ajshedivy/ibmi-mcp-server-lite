# SKELETON: build a yum RPM for the IBM i OSS environment (/QOpenSys/pkgs).
#
# This mirrors the public pipeline used by ThePrez/ServiceCommander-IBMi (the `sc`
# tool that ships alongside mapepire-server): a GitHub-hosted runner rsyncs the
# source tree to an IBM i partition over SSH and runs /QOpenSys/pkgs/bin/rpmbuild
# there. mapepire-server itself publishes a fat jar + zip from ubuntu-latest and
# deploys with @ibm/ibmi-ci; the RPM in IBM's yum repo is built by IBM internally.
#
# INTERN TODO before enabling (set repository variable ENABLE_IBMI_RPM_BUILD=true):
#   1. Provision a build IBM i partition with: rpmbuild, rsync, maven, a Java 17
#      runtime (see docs/running-on-ibmi.md — openjdk-17 is NOT yet in IBM's yum
#      repo), ca-certificates-mozilla.
#   2. Create repo secrets: IBMI_BUILD_SYS (host), IBMI_BUILD_USRPRF (user),
#      IBMI_BUILD_PVTKEY (private key authorized on the partition).
#   3. Finish packaging/rpm/ibmi-mcp-server-lite.spec (%files list, Requires).
#   4. Decide the publish target: GitHub Release assets (shown below) and/or your
#      own yum repo (createrepo + upload — not provided by IBM's public tooling).
name: RPM (IBM i)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  remote_build_dir: /home/${{ secrets.IBMI_BUILD_USRPRF }}/build/${{ github.sha }}

jobs:
  rpm:
    # Guard: skeleton stays inert until the IBM i build partition is configured.
    if: ${{ vars.ENABLE_IBMI_RPM_BUILD == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install private key
        run: |
          mkdir -p ~/.ssh
          chmod 0700 ~/.ssh
          echo "${{ secrets.IBMI_BUILD_PVTKEY }}" > ~/.ssh/id_rsa
          chmod 0600 ~/.ssh/id_rsa
          printf 'Host *\n  StrictHostKeyChecking no\n' > ~/.ssh/config

      - name: Create build sandbox on IBM i
        run: ssh ${{ secrets.IBMI_BUILD_USRPRF }}@${{ secrets.IBMI_BUILD_SYS }} "mkdir -p $remote_build_dir"

      - name: Populate build sandbox
        # Remote rsync is not on the default PASE PATH, hence --rsync-path.
        run: |
          rsync -a --exclude='.*' --rsync-path=/QOpenSys/pkgs/bin/rsync \
            ./ ${{ secrets.IBMI_BUILD_USRPRF }}@${{ secrets.IBMI_BUILD_SYS }}:$remote_build_dir/

      - name: Build RPM on IBM i
        run: |
          ssh ${{ secrets.IBMI_BUILD_USRPRF }}@${{ secrets.IBMI_BUILD_SYS }} \
            "cd $remote_build_dir && mkdir -p ./rpmbuild && \
             PATH=/QOpenSys/pkgs/bin:/QOpenSys/usr/bin:/usr/bin \
             /QOpenSys/pkgs/bin/rpmbuild -bb --build-in-place \
               --define '_topdir $remote_build_dir/rpmbuild' \
               --define '_disable_source_fetch 1' \
               packaging/rpm/ibmi-mcp-server-lite.spec"

      - name: Retrieve RPMs
        run: |
          scp -r ${{ secrets.IBMI_BUILD_USRPRF }}@${{ secrets.IBMI_BUILD_SYS }}:$remote_build_dir/rpmbuild/RPMS/ .

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibmi-rpm
          path: RPMS/**/*.rpm

      # INTERN TODO (release path): on tag builds, attach the RPM to a GitHub
      # Release (softprops/action-gh-release) and optionally push to a yum repo.

      - name: Cleanup remote build dir
        if: always()
        run: ssh ${{ secrets.IBMI_BUILD_USRPRF }}@${{ secrets.IBMI_BUILD_SYS }} "rm -fr $remote_build_dir"
